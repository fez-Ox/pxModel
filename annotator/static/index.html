<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pxModel Annotation Editor</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --border: #2a2f3a;
    --text: #e6e8ec;
    --muted: #8b93a3;
    --accent: #4c8bf5;
    --on: #2ecc71;
    --off: #3a3f4b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }
  h1 { font-size: 16px; margin: 0 0 10px; }
  .filters { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .filter {
    display: flex; flex-direction: column; gap: 3px;
    background: #12151b; border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 8px;
  }
  .filter label { font-size: 11px; color: var(--muted); text-transform: capitalize; }
  .filter select {
    background: #0f1115; color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 3px 6px;
  }
  .controls { display: flex; gap: 8px; align-items: center; margin-left: auto; }
  button {
    background: var(--accent); color: #fff; border: none;
    border-radius: 6px; padding: 7px 12px; cursor: pointer; font-size: 13px;
  }
  button.secondary { background: #262b36; }
  button:disabled { opacity: .4; cursor: default; }
  .meta { color: var(--muted); font-size: 13px; padding: 8px 16px; }
  .grid {
    display: grid; gap: 12px; padding: 16px;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; display: flex; flex-direction: column;
  }
  .thumb {
    width: 100%; height: 170px; object-fit: cover; background: #000;
    display: block;
  }
  .thumb.missing {
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 12px; height: 170px;
  }
  .card-body { padding: 8px 10px; }
  .fname { font-size: 10px; color: var(--muted); word-break: break-all; margin-bottom: 6px; }
  .labels { display: flex; flex-wrap: wrap; gap: 5px; }
  .pill {
    font-size: 11px; padding: 3px 8px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--off);
    cursor: pointer; user-select: none; text-transform: capitalize;
  }
  .pill.on { background: var(--on); color: #06210f; border-color: transparent; font-weight: 600; }
  .saved { color: var(--on); }
  .saving { color: var(--muted); }
  .error { color: #ff6b6b; }
  .status { font-size: 10px; height: 12px; margin-top: 6px; }
  footer { display: flex; justify-content: center; gap: 10px; align-items: center; padding: 16px; }
</style>
</head>
<body>
<header>
  <h1>pxModel Annotation Editor</h1>
  <div class="filters" id="filters"></div>
</header>
<div class="meta" id="meta">Loading…</div>
<div class="grid" id="grid"></div>
<footer>
  <button class="secondary" id="prev">← Prev</button>
  <span id="pageInfo" class="meta"></span>
  <button class="secondary" id="next">Next →</button>
</footer>

<script>
const state = { labels: [], filters: {}, page: 1, pageSize: 60, pages: 1, total: 0 };

async function init() {
  const res = await fetch("/api/labels");
  state.labels = (await res.json()).labels;
  renderFilters();
  await load();
}

function renderFilters() {
  const box = document.getElementById("filters");
  box.innerHTML = "";
  state.labels.forEach((name) => {
    const wrap = document.createElement("div");
    wrap.className = "filter";
    const lab = document.createElement("label");
    lab.textContent = name.replace(/_/g, " ");
    const sel = document.createElement("select");
    [["", "any"], ["1", "on"], ["0", "off"]].forEach(([v, t]) => {
      const o = document.createElement("option");
      o.value = v; o.textContent = t; sel.appendChild(o);
    });
    sel.onchange = () => {
      if (sel.value === "") delete state.filters[name];
      else state.filters[name] = sel.value;
      state.page = 1;
      load();
    };
    wrap.appendChild(lab); wrap.appendChild(sel);
    box.appendChild(wrap);
  });
  const controls = document.createElement("div");
  controls.className = "controls";
  const reset = document.createElement("button");
  reset.className = "secondary"; reset.textContent = "Reset filters";
  reset.onclick = () => {
    state.filters = {}; state.page = 1;
    box.querySelectorAll("select").forEach((s) => (s.value = ""));
    load();
  };
  controls.appendChild(reset);
  box.appendChild(controls);
}

async function load() {
  const params = new URLSearchParams({ page: state.page, page_size: state.pageSize });
  Object.entries(state.filters).forEach(([k, v]) => params.set(k, v));
  document.getElementById("meta").textContent = "Loading…";
  const res = await fetch("/api/annotations?" + params.toString());
  const data = await res.json();
  state.pages = data.pages; state.total = data.total; state.page = data.page;
  renderGrid(data.items);
  document.getElementById("meta").textContent =
    `${data.total} image(s) match — page ${data.page} of ${data.pages}`;
  document.getElementById("pageInfo").textContent = `Page ${data.page} / ${data.pages}`;
  document.getElementById("prev").disabled = data.page <= 1;
  document.getElementById("next").disabled = data.page >= data.pages;
}

function renderGrid(items) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  items.forEach((item) => grid.appendChild(renderCard(item)));
}

function renderCard(item) {
  const card = document.createElement("div");
  card.className = "card";

  if (item.exists) {
    const img = document.createElement("img");
    img.className = "thumb";
    img.loading = "lazy";
    img.src = "/images/" + encodeURIComponent(item.filename);
    card.appendChild(img);
  } else {
    const ph = document.createElement("div");
    ph.className = "thumb missing";
    ph.textContent = "image missing";
    card.appendChild(ph);
  }

  const body = document.createElement("div");
  body.className = "card-body";
  const fn = document.createElement("div");
  fn.className = "fname"; fn.textContent = item.filename;
  body.appendChild(fn);

  const labels = document.createElement("div");
  labels.className = "labels";
  const status = document.createElement("div");
  status.className = "status";

  state.labels.forEach((name) => {
    const pill = document.createElement("span");
    pill.className = "pill" + (item.labels[name] ? " on" : "");
    pill.textContent = name.replace(/_/g, " ");
    pill.onclick = async () => {
      const newVal = item.labels[name] ? 0 : 1;
      status.textContent = "saving…"; status.className = "status saving";
      try {
        const res = await fetch("/api/annotations/" + encodeURIComponent(item.filename), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ labels: { [name]: newVal } }),
        });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        item.labels[name] = newVal;
        pill.classList.toggle("on", !!newVal);
        status.textContent = "saved ✓"; status.className = "status saved";
      } catch (e) {
        status.textContent = "error: " + e.message; status.className = "status error";
      }
    };
    labels.appendChild(pill);
  });

  body.appendChild(labels);
  body.appendChild(status);
  card.appendChild(body);
  return card;
}

document.getElementById("prev").onclick = () => { if (state.page > 1) { state.page--; load(); } };
document.getElementById("next").onclick = () => { if (state.page < state.pages) { state.page++; load(); } };

init();
</script>
</body>
</html>
